<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Role Models - CivicHerNaija</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fca311;
            --secondary-color: #14213d;
            --bg-color: #0d1117;
            --glass-bg: rgba(20, 33, 61, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e5e5e5;
            --text-muted: #a3a3a3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(252, 163, 17, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 33, 61, 0.8), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
        }

        .navbar h2 {
            background: linear-gradient(90deg, #fca311, #ffc05c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }
        
        .navbar a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s;
            margin: 0 1rem;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--primary-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover { background: var(--primary-color); color: var(--secondary-color); }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            margin-bottom: 2rem;
        }

        .card h3 { margin-bottom: 1.5rem; font-size: 1.4rem; color: #fff; }

        .create-btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: var(--secondary-color);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .create-btn:hover { background: #ffc05c; transform: translateY(-2px); }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th { color: var(--primary-color); }

        .action-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .edit-btn { background: #3b82f6; color: white; }
        .edit-btn:hover { background: #2563eb; }
        .delete-btn { background: #ef4444; color: white; }
        .delete-btn:hover { background: #dc2626; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }
        
        .modal-content h3 { margin-bottom: 1rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.95rem; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary-color);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: var(--secondary-color);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #ffc05c; transform: translateY(-2px); }
        .btn-cancel { background: transparent; border: 1px solid #ccc; color: #ccc; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); transform: translateY(0); }
        
        .flex-end {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .achievements-input-group { margin-bottom: 1rem; }
        .achievement-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .achievement-item input {
            flex: 1;
        }
        .remove-btn {
            padding: 0.5rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .navbar {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .navbar h2 { margin-right: 0 !important; }
            .navbar div { flex-wrap: wrap; justify-content: center; }
            .card { padding: 1.5rem; }
            .modal-content { padding: 1.5rem; }
            .action-btn { margin-bottom: 0.5rem; display: inline-block; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Admin Dashboard</h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/admin.html">Dashboard</a>
            <a href="/manage-modules.html">Modules</a>
            <a href="/manage-opportunities.html">Opportunities</a>
            <a href="/manage-practice.html">Practice</a>
            <a href="/manage-rolemodels.html" class="active">Role Models</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="card">
        <h3>Manage Role Models</h3>
        <button class="create-btn" onclick="openCreateModal()">+ Add Role Model</button>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Title</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="rolesTableBody">
                    <tr><td colspan="3">Loading role models...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Create Role Model Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>Add Role Model</h3>
            <form id="createForm">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="createName" required>
                </div>
                <div class="form-group">
                    <label>Title (e.g., "Former Senator", "Political Activist") *</label>
                    <input type="text" id="createTitle" required>
                </div>
                <div class="form-group">
                    <label>Story *</label>
                    <textarea id="createStory" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="createImage">
                </div>
                <div class="form-group">
                    <label>Quote Text</label>
                    <input type="text" id="createQuoteText">
                </div>
                <div class="form-group">
                    <label>Quote Attribution</label>
                    <input type="text" id="createQuoteAttr">
                </div>
                <div class="form-group">
                    <label>Achievements</label>
                    <div id="createAchievementsContainer"></div>
                    <button type="button" class="btn" style="background: #3b82f6; margin-top: 0.5rem;" onclick="addAchievementField('create')">+ Add Achievement</button>
                </div>
                <div class="flex-end">
                    <button type="button" class="btn btn-cancel" onclick="closeModal('createModal')">Cancel</button>
                    <button type="submit" class="btn">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Role Model Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Role Model</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Title (e.g., "Former Senator", "Political Activist") *</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Story *</label>
                    <textarea id="editStory" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="editImage">
                </div>
                <div class="form-group">
                    <label>Quote Text</label>
                    <input type="text" id="editQuoteText">
                </div>
                <div class="form-group">
                    <label>Quote Attribution</label>
                    <input type="text" id="editQuoteAttr">
                </div>
                <div class="form-group">
                    <label>Achievements</label>
                    <div id="editAchievementsContainer"></div>
                    <button type="button" class="btn" style="background: #3b82f6; margin-top: 0.5rem;" onclick="addAchievementField('edit')">+ Add Achievement</button>
                </div>
                <div class="flex-end">
                    <button type="button" class="btn btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                    <button type="submit" class="btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/login.html';

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        }

        let rolesList = [];

        async function fetchRoleModels() {
            try {
                const res = await fetch('/api/admin/rolemodels', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                
                const data = await res.json();
                const tbody = document.getElementById('rolesTableBody');
                
                if (res.ok) {
                    rolesList = data;
                    if(data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3">No role models found.</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = data.map(role => `
                        <tr>
                            <td>${role.name}</td>
                            <td>${role.title}</td>
                            <td>
                                <button class="action-btn edit-btn" onclick="openEditModal('${role._id}')">Edit</button>
                                <button class="action-btn delete-btn" onclick="deleteRoleModel('${role._id}')">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Failed to load role models", err);
                document.getElementById('rolesTableBody').innerHTML = '<tr><td colspan="3" style="color:#f87171;">Failed to load data.</td></tr>';
            }
        }

        async function deleteRoleModel(id) {
            if (!confirm("Are you sure you want to delete this role model? This action cannot be undone.")) return;
            
            try {
                const res = await fetch(`/api/admin/rolemodels/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchRoleModels();
                } else {
                    alert('Error deleting role model');
                }
            } catch (err) {
                console.error(err);
                alert('Network error');
            }
        }

        function openCreateModal() {
            document.getElementById('createAchievementsContainer').innerHTML = '';
            document.getElementById('createForm').reset();
            document.getElementById('createModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const role = rolesList.find(r => r._id === id);
            if(!role) return;
            
            document.getElementById('editId').value = role._id;
            document.getElementById('editName').value = role.name || '';
            document.getElementById('editTitle').value = role.title || '';
            document.getElementById('editStory').value = role.story || '';
            document.getElementById('editImage').value = role.imageUrl || '';
            document.getElementById('editQuoteText').value = role.quoteText || '';
            document.getElementById('editQuoteAttr').value = role.quoteAttr || '';
            
            const achievementsContainer = document.getElementById('editAchievementsContainer');
            achievementsContainer.innerHTML = '';
            if (role.achievements && role.achievements.length > 0) {
                role.achievements.forEach((achievement, idx) => {
                    achievementsContainer.innerHTML += `
                        <div class="achievement-item" id="editAchievement${idx}">
                            <input type="text" value="${achievement}" class="edit-achievement-input">
                            <button type="button" class="remove-btn" onclick="removeAchievementField('editAchievement${idx}')">Remove</button>
                        </div>
                    `;
                });
            }
            
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function addAchievementField(formType) {
            const containerId = `${formType}AchievementsContainer`;
            const container = document.getElementById(containerId);
            const idx = container.children.length;
            const achievementHTML = `
                <div class="achievement-item" id="${formType}Achievement${idx}">
                    <input type="text" class="${formType}-achievement-input" placeholder="Add an achievement">
                    <button type="button" class="remove-btn" onclick="removeAchievementField('${formType}Achievement${idx}')">Remove</button>
                </div>
            `;
            container.innerHTML += achievementHTML;
        }

        function removeAchievementField(fieldId) {
            const field = document.getElementById(fieldId);
            if (field) field.remove();
        }

        function getAchievements(formType) {
            const container = document.getElementById(`${formType}AchievementsContainer`);
            const inputs = container.querySelectorAll(`.${formType}-achievement-input`);
            const achievements = Array.from(inputs).map(input => input.value).filter(val => val.trim() !== '');
            return achievements;
        }

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('createName').value;
            const title = document.getElementById('createTitle').value;
            const story = document.getElementById('createStory').value;
            const imageUrl = document.getElementById('createImage').value;
            const quoteText = document.getElementById('createQuoteText').value;
            const quoteAttr = document.getElementById('createQuoteAttr').value;
            const achievements = getAchievements('create');
            
            try {
                const res = await fetch('/api/admin/rolemodels', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ name, title, story, imageUrl, quoteText, quoteAttr, achievements })
                });
                
                if (res.ok) {
                    closeModal('createModal');
                    fetchRoleModels();
                    alert('Role model created successfully!');
                } else {
                    alert('Failed to create role model');
                }
            } catch (err) {
                console.error(err);
                alert('Network error');
            }
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value;
            const title = document.getElementById('editTitle').value;
            const story = document.getElementById('editStory').value;
            const imageUrl = document.getElementById('editImage').value;
            const quoteText = document.getElementById('editQuoteText').value;
            const quoteAttr = document.getElementById('editQuoteAttr').value;
            const achievements = getAchievements('edit');
            
            try {
                const res = await fetch(`/api/admin/rolemodels/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ name, title, story, imageUrl, quoteText, quoteAttr, achievements })
                });
                
                if (res.ok) {
                    closeModal('editModal');
                    fetchRoleModels();
                    alert('Role model updated successfully!');
                } else {
                    alert('Failed to update role model');
                }
            } catch (err) {
                console.error(err);
                alert('Network error');
            }
        });

        // Initialize
        fetchRoleModels();
    </script>
</body>
</html>
