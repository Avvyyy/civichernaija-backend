<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6b21a8;
      --primary-light: #9d4edd;
      --primary-dark: #3c0a54;
      --text-dark: #211235;
      --text-muted: #7c6f8f;
      --bg-light: #f4f0f8;
      --border: #ddd6ea;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f9f7fc;
      color: var(--text-dark);
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 28px;
      color: var(--primary-dark);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-card h3 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }

    .section {
      background: white;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--primary-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--bg-light);
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #e9e1f1;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      font-size: 12px;
      padding: 8px 12px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
      font-size: 12px;
      padding: 8px 12px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-dark);
      font-size: 14px;
    }

    input[type='text'],
    input[type='number'],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-dark);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(107, 33, 168, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .tabs {
        width: 100%;
				overflow-x: auto;
      }
    }

    .options-list {
      margin-top: 15px;
      padding: 15px;
      background: var(--bg-light);
      border-radius: 8px;
    }

    .option-item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .option-item input {
      flex: 1;
      margin: 5px 0 0 0;
    }

    .option-item button {
      flex-shrink: 0;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .resource-card {
      background: var(--bg-light);
      padding: 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .resource-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .resource-card h3 {
      font-size: 16px;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .resource-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .resource-badge {
      display: inline-block;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: white;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .resource-badge.active {
      background: var(--success);
      color: white;
    }

    .resource-badge.inactive {
      background: #fee2e2;
      color: var(--danger);
    }

    .resource-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .resource-actions button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
    }

    .alert {
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .alert-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--primary-dark);
    }

    .modal-close {
      float: right;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-close:hover {
      color: var(--text-dark);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 Practice Management</h1>
      <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" onclick="switchTab('simulations')">Simulations</button>
      <button class="tab-btn" onclick="switchTab('debates')">Debate Topics</button>
      <button class="tab-btn" onclick="switchTab('policy')">Policy Guidance</button>
      <button class="tab-btn" onclick="switchTab('submissions')">Submissions</button>
    </div>

    <!-- Overview Tab -->
    <div id="overview" class="tab-content active">
      <div class="stats-grid" id="statsGrid"></div>

      <div class="section">
        <div class="section-title">Recent Submissions</div>
        <div id="recentSubmissions"></div>
      </div>
    </div>

    <!-- Simulations Tab -->
    <div id="simulations" class="tab-content">
      <div class="section">
        <div class="section-title">
          Add Simulation
          <button class="btn btn-primary" onclick="toggleSimulationForm()">+ New Simulation</button>
        </div>
        <div id="simulationForm" style="display: none;">
          <div class="form-group">
            <label>Scenario</label>
            <textarea id="simScenario" placeholder="Describe the scenario..."></textarea>
          </div>
          <div class="form-group">
            <label>Context</label>
            <textarea id="simContext" placeholder="Provide background context..."></textarea>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <select id="simDifficulty">
              <option>beginner</option>
              <option selected>intermediate</option>
              <option>advanced</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="simCategory" placeholder="e.g., budget-allocation, governance">
          </div>
          <div class="form-group">
            <label>Options</label>
            <div class="options-list" id="simOptionsList"></div>
            <button class="btn btn-secondary" onclick="addSimulationOption()" style="margin-top: 10px;">+ Add Option</button>
          </div>
          <div class="form-group">
            <label>Evaluation Criteria</label>
            <textarea id="simCriteria" placeholder="Guidance for AI evaluation..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveSimulation()">Save Simulation</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">All Simulations</div>
        <div class="resources-grid" id="simulationsGrid"></div>
      </div>
    </div>

    <!-- Debates Tab -->
    <div id="debates" class="tab-content">
      <div class="section">
        <div class="section-title">
          Add Debate Topic
          <button class="btn btn-primary" onclick="toggleDebateForm()">+ New Topic</button>
        </div>
        <div id="debateForm" style="display: none;">
          <div class="form-group">
            <label>Debate Topic</label>
            <textarea id="debateTopic" placeholder="Enter the debate topic..."></textarea>
          </div>
          <div class="form-group">
            <label>Context</label>
            <textarea id="debateContext" placeholder="Provide context for the debate..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Time Limit (seconds)</label>
              <input type="number" id="debateTime" value="120" min="30" max="600">
            </div>
            <div class="form-group">
              <label>Difficulty</label>
              <select id="debateDifficulty">
                <option>beginner</option>
                <option selected>intermediate</option>
                <option>advanced</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="debateCategory" placeholder="e.g., governance, women-rights">
          </div>
          <div class="form-group">
            <label>Evaluation Criteria</label>
            <textarea id="debateCriteria" placeholder="Guidance for AI evaluation..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveDebate()">Save Debate Topic</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">All Debate Topics</div>
        <div class="resources-grid" id="debatesGrid"></div>
      </div>
    </div>

    <!-- Policy Guidance Tab -->
    <div id="policy" class="tab-content">
      <div class="section">
        <div class="section-title">
          Add Policy Guidance
          <button class="btn btn-primary" onclick="togglePolicyForm()">+ New Guidance</button>
        </div>
        <div id="policyForm" style="display: none;">
          <div class="form-group">
            <label>Policy Guidance Title</label>
            <input type="text" id="policyTitle" placeholder="Enter title...">
          </div>
          <div class="form-group">
            <label>Content/Guidelines</label>
            <textarea id="policyContent" placeholder="Provide guidance content..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Difficulty</label>
              <select id="policyDifficulty">
                <option>beginner</option>
                <option selected>intermediate</option>
                <option>advanced</option>
              </select>
            </div>
            <div class="form-group">
              <label>Category</label>
              <input type="text" id="policyCategory" placeholder="e.g., budget, education">
            </div>
          </div>
          <div class="form-group">
            <label>Evaluation Criteria</label>
            <textarea id="policyCriteria" placeholder="Guidance for AI evaluation..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="savePolicy()">Save Policy Guidance</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">All Policy Guidance</div>
        <div class="resources-grid" id="policyGrid"></div>
      </div>
    </div>

    <!-- Submissions Tab -->
    <div id="submissions" class="tab-content">
      <div class="section">
        <div class="section-title">Recent Submissions</div>
        <div id="allSubmissions"></div>
      </div>
    </div>
  </div>

  <script>
    let adminToken = localStorage.getItem('adminToken');
    let simOptions = [];

    if (!adminToken) {
      window.location.href = 'admin.html';
    }

    const API = 'http://localhost:8080/api';

    function showAlert(message, type = 'success') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert show alert-${type}`;
      setTimeout(() => alert.classList.remove('show'), 4000);
    }

    async function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'overview') await loadOverview();
      if (tabName === 'simulations') await loadSimulations();
      if (tabName === 'debates') await loadDebates();
      if (tabName === 'policy') await loadPolicy();
      if (tabName === 'submissions') await loadAllSubmissions();
    }

    async function loadOverview() {
      try {
        const res = await fetch(`${API}/admin/practice-analytics`, {
          headers: { 'Authorization': adminToken }
        });
        const data = await res.json();

        const statsHtml = `
          <div class="stat-card">
            <h3>Total Submissions</h3>
            <div class="value">${data.totalSubmissions}</div>
          </div>
          <div class="stat-card">
            <h3>Evaluated</h3>
            <div class="value">${data.completedEvaluations}</div>
          </div>
          <div class="stat-card">
            <h3>Avg Score</h3>
            <div class="value">${Math.round(data.averageScore)}</div>
          </div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;

        await loadRecentSubmissions();
      } catch (err) {
        showAlert('Error loading overview: ' + err.message, 'error');
      }
    }

    async function loadRecentSubmissions() {
      try {
        const res = await fetch(`${API}/admin/practice-submissions?limit=5`, {
          headers: { 'Authorization': adminToken }
        });
        const submissions = await res.json();

        let html = '<table style="width: 100%; border-collapse: collapse;">';
        html += '<tr style="border-bottom: 2px solid var(--border);"><th style="text-align: left; padding: 8px;">User</th><th style="text-align: left; padding: 8px;">Type</th><th style="text-align: left; padding: 8px;">Status</th><th style="text-align: left; padding: 8px;">Date</th></tr>';

        submissions.forEach(sub => {
          const date = new Date(sub.createdAt).toLocaleDateString();
          html += `<tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 10px;">${sub.userId?.name || 'Unknown'}</td>
            <td style="padding: 10px;">${sub.submissionType}</td>
            <td style="padding: 10px;"><span class="resource-badge ${sub.evaluationStatus === 'completed' ? 'active' : ''}">${sub.evaluationStatus}</span></td>
            <td style="padding: 10px;">${date}</td>
          </tr>`;
        });
        html += '</table>';

        document.getElementById('recentSubmissions').innerHTML = html;
      } catch (err) {
        console.error('Error loading submissions:', err);
      }
    }

    function toggleSimulationForm() {
      const form = document.getElementById('simulationForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        simOptions = [];
        addSimulationOption();
      }
    }

    function addSimulationOption() {
      simOptions.push({ id: '', title: '', description: '' });
      renderSimOptions();
    }

    function renderSimOptions() {
      let html = '';
      simOptions.forEach((opt, idx) => {
        html += `
          <div class="option-item">
            <div style="flex: 1;">
              <input type="text" placeholder="Option ID" value="${opt.id}" 
                onchange="simOptions[${idx}].id = this.value">
              <input type="text" placeholder="Option Title" value="${opt.title}"
                onchange="simOptions[${idx}].title = this.value" style="margin-top: 5px;">
              <textarea placeholder="Description" 
                onchange="simOptions[${idx}].description = this.value" style="margin-top: 5px; min-height: 60px;">${opt.description}</textarea>
            </div>
            <button class="btn btn-danger" onclick="simOptions.splice(${idx}, 1); renderSimOptions();">Remove</button>
          </div>
        `;
      });
      document.getElementById('simOptionsList').innerHTML = html;
    }

    async function saveSimulation() {
      const scenario = document.getElementById('simScenario').value.trim();
      const context = document.getElementById('simContext').value.trim();
      const difficulty = document.getElementById('simDifficulty').value;
      const category = document.getElementById('simCategory').value.trim();
      const criteria = document.getElementById('simCriteria').value.trim();

      if (!scenario || simOptions.length === 0) {
        showAlert('Scenario and at least one option are required', 'warning');
        return;
      }

      try {
        const res = await fetch(`${API}/admin/practice-resources/simulation`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': adminToken
          },
          body: JSON.stringify({
            scenario, context, options: simOptions, criteria, difficulty, category
          })
        });

        if (!res.ok) throw new Error('Failed to save');
        showAlert('Simulation saved successfully!', 'success');
        toggleSimulationForm();
        document.getElementById('simScenario').value = '';
        document.getElementById('simContext').value = '';
        document.getElementById('simCriteria').value = '';
        document.getElementById('simCategory').value = '';
        await loadSimulations();
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function loadSimulations() {
      try {
        const res = await fetch(`${API}/admin/practice-resources/type/simulation`, {
          headers: { 'Authorization': adminToken }
        });
        const resources = await res.json();

        let html = '';
        resources.forEach(res => {
          html += `
            <div class="resource-card">
              <div class="resource-card-header">
                <div>
                  <span class="resource-badge ${res.isActive ? 'active' : 'inactive'}">
                    ${res.isActive ? 'Active' : 'Inactive'}
                  </span>
                  <h3>Simulation</h3>
                </div>
              </div>
              <p>${res.simulationScenario}</p>
              <div class="resource-actions">
                <button class="btn btn-warning" onclick="toggleResourceStatus('${res._id}')">
                  ${res.isActive ? 'Deactivate' : 'Activate'}
                </button>
                <button class="btn btn-danger" onclick="deleteResource('${res._id}')">Delete</button>
              </div>
            </div>
          `;
        });
        document.getElementById('simulationsGrid').innerHTML = html || '<p>No simulations yet.</p>';
      } catch (err) {
        showAlert('Error loading simulations: ' + err.message, 'error');
      }
    }

    function toggleDebateForm() {
      const form = document.getElementById('debateForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function saveDebate() {
      const topic = document.getElementById('debateTopic').value.trim();
      const context = document.getElementById('debateContext').value.trim();
      const timeLimit = parseInt(document.getElementById('debateTime').value);
      const difficulty = document.getElementById('debateDifficulty').value;
      const category = document.getElementById('debateCategory').value.trim();
      const criteria = document.getElementById('debateCriteria').value.trim();

      if (!topic) {
        showAlert('Debate topic is required', 'warning');
        return;
      }

      try {
        const res = await fetch(`${API}/admin/practice-resources/debate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': adminToken
          },
          body: JSON.stringify({ topic, context, timeLimit, criteria, difficulty, category })
        });

        if (!res.ok) throw new Error('Failed to save');
        showAlert('Debate topic saved successfully!', 'success');
        toggleDebateForm();
        document.getElementById('debateTopic').value = '';
        document.getElementById('debateContext').value = '';
        document.getElementById('debateCriteria').value = '';
        document.getElementById('debateCategory').value = '';
        await loadDebates();
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function loadDebates() {
      try {
        const res = await fetch(`${API}/admin/practice-resources/type/debateTopic`, {
          headers: { 'Authorization': adminToken }
        });
        const resources = await res.json();

        let html = '';
        resources.forEach(res => {
          html += `
            <div class="resource-card">
              <div class="resource-card-header">
                <div>
                  <span class="resource-badge ${res.isActive ? 'active' : 'inactive'}">
                    ${res.isActive ? 'Active' : 'Inactive'}
                  </span>
                  <h3>Debate Topic</h3>
                </div>
              </div>
              <p>${res.debateTopic}</p>
              <div class="resource-actions">
                <button class="btn btn-warning" onclick="toggleResourceStatus('${res._id}')">
                  ${res.isActive ? 'Deactivate' : 'Activate'}
                </button>
                <button class="btn btn-danger" onclick="deleteResource('${res._id}')">Delete</button>
              </div>
            </div>
          `;
        });
        document.getElementById('debatesGrid').innerHTML = html || '<p>No debate topics yet.</p>';
      } catch (err) {
        showAlert('Error loading debates: ' + err.message, 'error');
      }
    }

    function togglePolicyForm() {
      const form = document.getElementById('policyForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function savePolicy() {
      const title = document.getElementById('policyTitle').value.trim();
      const content = document.getElementById('policyContent').value.trim();
      const difficulty = document.getElementById('policyDifficulty').value;
      const category = document.getElementById('policyCategory').value.trim();
      const criteria = document.getElementById('policyCriteria').value.trim();

      if (!title || !content) {
        showAlert('Title and content are required', 'warning');
        return;
      }

      try {
        const res = await fetch(`${API}/admin/practice-resources/policy-guidance`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': adminToken
          },
          body: JSON.stringify({ title, content, criteria, difficulty, category })
        });

        if (!res.ok) throw new Error('Failed to save');
        showAlert('Policy guidance saved successfully!', 'success');
        togglePolicyForm();
        document.getElementById('policyTitle').value = '';
        document.getElementById('policyContent').value = '';
        document.getElementById('policyCriteria').value = '';
        document.getElementById('policyCategory').value = '';
        await loadPolicy();
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function loadPolicy() {
      try {
        const res = await fetch(`${API}/admin/practice-resources/type/policyGuidance`, {
          headers: { 'Authorization': adminToken }
        });
        const resources = await res.json();

        let html = '';
        resources.forEach(res => {
          html += `
            <div class="resource-card">
              <div class="resource-card-header">
                <div>
                  <span class="resource-badge ${res.isActive ? 'active' : 'inactive'}">
                    ${res.isActive ? 'Active' : 'Inactive'}
                  </span>
                  <h3>${res.policyGuidanceTitle}</h3>
                </div>
              </div>
              <p>${res.policyGuidanceContent.substring(0, 100)}...</p>
              <div class="resource-actions">
                <button class="btn btn-warning" onclick="toggleResourceStatus('${res._id}')">
                  ${res.isActive ? 'Deactivate' : 'Activate'}
                </button>
                <button class="btn btn-danger" onclick="deleteResource('${res._id}')">Delete</button>
              </div>
            </div>
          `;
        });
        document.getElementById('policyGrid').innerHTML = html || '<p>No policy guidance yet.</p>';
      } catch (err) {
        showAlert('Error loading policy guidance: ' + err.message, 'error');
      }
    }

    async function toggleResourceStatus(id) {
      try {
        const res = await fetch(`${API}/admin/practice-resources/${id}/toggle`, {
          method: 'PATCH',
          headers: { 'Authorization': adminToken }
        });
        if (!res.ok) throw new Error('Failed to toggle');
        showAlert('Resource status updated!', 'success');
        switchTab(document.querySelector('.tab-btn.active').textContent.toLowerCase().includes('simulation') ? 'simulations' : 
                  document.querySelector('.tab-btn.active').textContent.toLowerCase().includes('debate') ? 'debates' : 'policy');
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function deleteResource(id) {
      if (!confirm('Are you sure?')) return;
      try {
        const res = await fetch(`${API}/admin/practice-resources/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': adminToken }
        });
        if (!res.ok) throw new Error('Failed to delete');
        showAlert('Resource deleted!', 'success');
        switchTab(document.querySelector('.tab-btn.active').textContent.toLowerCase().includes('simulation') ? 'simulations' : 
                  document.querySelector('.tab-btn.active').textContent.toLowerCase().includes('debate') ? 'debates' : 'policy');
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function loadAllSubmissions() {
      try {
        const res = await fetch(`${API}/admin/practice-submissions?limit=50`, {
          headers: { 'Authorization': adminToken }
        });
        const submissions = await res.json();

        let html = '<table style="width: 100%; border-collapse: collapse; font-size: 13px;">';
        html += '<tr style="border-bottom: 2px solid var(--border);"><th style="text-align: left; padding: 10px;">User</th><th style="text-align: left; padding: 10px;">Type</th><th style="text-align: left; padding: 10px;">Score</th><th style="text-align: left; padding: 10px;">Status</th><th style="text-align: left; padding: 10px;">Date</th></tr>';

        submissions.forEach(sub => {
          const date = new Date(sub.createdAt).toLocaleDateString();
          const score = sub.aiEvaluation?.score ? Math.round(sub.aiEvaluation.score) : '-';
          html += `<tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 10px;">${sub.userId?.name || 'Unknown'}</td>
            <td style="padding: 10px;">${sub.submissionType}</td>
            <td style="padding: 10px;">${score}</td>
            <td style="padding: 10px;"><span class="resource-badge ${sub.evaluationStatus === 'completed' ? 'active' : ''}">${sub.evaluationStatus}</span></td>
            <td style="padding: 10px;">${date}</td>
          </tr>`;
        });
        html += '</table>';

        document.getElementById('allSubmissions').innerHTML = html;
      } catch (err) {
        showAlert('Error loading submissions: ' + err.message, 'error');
      }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'admin.html';
    }

    // Load overview on page load
    loadOverview();
  </script>
</body>
</html>
