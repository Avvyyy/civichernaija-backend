<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Practice - CivicHerNaija</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fca311;
            --secondary-color: #14213d;
            --bg-color: #0d1117;
            --glass-bg: rgba(20, 33, 61, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e5e5e5;
            --text-muted: #a3a3a3;
            --success: #4ade80;
            --danger: #f87171;
            --warn: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(252, 163, 17, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(20, 33, 61, 0.8), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
        }

        .navbar h2 {
            background: linear-gradient(90deg, #fca311, #ffc05c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }

        .navbar a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--primary-color);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover { background: var(--primary-color); color: var(--secondary-color); }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            margin-bottom: 1.5rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .tab-btn {
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .tab-btn.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-title {
            color: #fff;
            font-size: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .stat-box h4 {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .stat-box p {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .btn {
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--secondary-color);
        }

        .btn-primary:hover { background: #ffc05c; transform: translateY(-2px); }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-secondary:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            padding: 0.45rem 0.75rem;
            font-size: 0.85rem;
        }

        .btn-warn {
            background: #f59e0b;
            color: #fff;
            padding: 0.45rem 0.75rem;
            font-size: 0.85rem;
        }

        .btn-warn:disabled {
            background: rgba(245, 158, 11, 0.45);
            color: rgba(255, 255, 255, 0.85);
            cursor: not-allowed;
            transform: none;
            opacity: 0.85;
        }

        .form-wrap {
            display: none;
            border-top: 1px solid var(--glass-border);
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; color: var(--text-main); }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.85rem;
            border-bottom: 1px solid var(--glass-border);
            vertical-align: top;
        }

        th { color: var(--primary-color); }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-active { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .badge-inactive { background: rgba(248, 113, 113, 0.2); color: var(--danger); }

        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .option-item {
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .alert {
            display: none;
            margin-bottom: 1rem;
            padding: 0.9rem;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .alert.show { display: block; }
        .alert-success { color: var(--success); border-color: rgba(74, 222, 128, 0.4); background: rgba(74, 222, 128, 0.1); }
        .alert-error { color: var(--danger); border-color: rgba(248, 113, 113, 0.4); background: rgba(248, 113, 113, 0.1); }
        .alert-warning { color: var(--warn); border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.1); }

        @media (max-width: 900px) {
            body { padding: 1rem; }
            .navbar { flex-direction: column; gap: 1rem; text-align: center; }
            .navbar h2 { margin-right: 0; }
            .navbar > div { flex-wrap: wrap; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .grid-2 { grid-template-columns: 1fr; }
            .card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Admin Dashboard</h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/admin.html">Dashboard</a>
            <a href="/manage-modules.html">Modules</a>
            <a href="/manage-opportunities.html">Opportunities</a>
            <a href="/manage-practice.html" class="active">Practice</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="alert" class="alert"></div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="simulations">Simulations</button>
            <button class="tab-btn" data-tab="debates">Debate Topics</button>
            <button class="tab-btn" data-tab="policy">Policy Guidance</button>
            <button class="tab-btn" data-tab="submissions">Submissions</button>
        </div>

        <section id="overview" class="tab-content active">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="table-wrap" id="recentSubmissions"></div>
        </section>

        <section id="simulations" class="tab-content">
            <div class="section-title">
                <span>Manage Simulations</span>
                <button class="btn btn-primary" id="toggleSimulationBtn">Add Simulation</button>
            </div>
            <div id="simulationForm" class="form-wrap">
                <div class="form-group">
                    <label for="simScenario">Scenario</label>
                    <textarea id="simScenario" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="simContext">Context</label>
                    <textarea id="simContext" rows="3"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="simDifficulty">Difficulty</label>
                        <select id="simDifficulty">
                            <option>beginner</option>
                            <option selected>intermediate</option>
                            <option>advanced</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="simCategory">Category</label>
                        <input id="simCategory" type="text" placeholder="e.g., governance">
                    </div>
                </div>
                <div class="form-group">
                    <label>Options</label>
                    <div id="simOptionsList"></div>
                    <button class="btn btn-secondary" id="addOptionBtn" type="button">Add Option</button>
                </div>
                <div class="form-group">
                    <label for="simCriteria">Evaluation Criteria</label>
                    <textarea id="simCriteria" rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="saveSimulationBtn" type="button">Save Simulation</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Scenario</th>
                            <th>Difficulty</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="simulationsTableBody"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>
        </section>

        <section id="debates" class="tab-content">
            <div class="section-title">
                <span>Manage Debate Topics</span>
                <button class="btn btn-primary" id="toggleDebateBtn">Add Debate Topic</button>
            </div>
            <div id="debateForm" class="form-wrap">
                <div class="form-group">
                    <label for="debateTopic">Topic</label>
                    <textarea id="debateTopic" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="debateContext">Context</label>
                    <textarea id="debateContext" rows="3"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="debateTime">Time Limit (seconds)</label>
                        <input id="debateTime" type="number" value="120" min="30" max="600">
                    </div>
                    <div class="form-group">
                        <label for="debateDifficulty">Difficulty</label>
                        <select id="debateDifficulty">
                            <option>beginner</option>
                            <option selected>intermediate</option>
                            <option>advanced</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="debateCategory">Category</label>
                    <input id="debateCategory" type="text" placeholder="e.g., policy">
                </div>
                <div class="form-group">
                    <label for="debateCriteria">Evaluation Criteria</label>
                    <textarea id="debateCriteria" rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="saveDebateBtn" type="button">Save Debate Topic</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Topic</th>
                            <th>Difficulty</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="debatesTableBody"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>
        </section>

        <section id="policy" class="tab-content">
            <div class="section-title">
                <span>Manage Policy Guidance</span>
                <button class="btn btn-primary" id="togglePolicyBtn">Add Policy Guidance</button>
            </div>
            <div id="policyForm" class="form-wrap">
                <div class="form-group">
                    <label for="policyTitle">Title</label>
                    <input id="policyTitle" type="text">
                </div>
                <div class="form-group">
                    <label for="policyContent">Guidance Content</label>
                    <textarea id="policyContent" rows="4"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="policyDifficulty">Difficulty</label>
                        <select id="policyDifficulty">
                            <option>beginner</option>
                            <option selected>intermediate</option>
                            <option>advanced</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="policyCategory">Category</label>
                        <input id="policyCategory" type="text" placeholder="e.g., budgeting">
                    </div>
                </div>
                <div class="form-group">
                    <label for="policyCriteria">Evaluation Criteria</label>
                    <textarea id="policyCriteria" rows="3"></textarea>
                </div>
                <button class="btn btn-primary" id="savePolicyBtn" type="button">Save Policy Guidance</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Difficulty</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="policyTableBody"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>
        </section>

        <section id="submissions" class="tab-content">
            <div class="section-title"><span>Recent Practice Submissions</span></div>
            <div class="table-wrap" id="allSubmissions"></div>
        </section>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/login.html';
        }

        const API_BASE = '/api/admin';
        let simOptions = [];
        let reevaluateLoadingId = null;

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        }

        function authHeaders(withJson) {
            const base = { Authorization: `Bearer ${token}` };
            if (withJson) base['Content-Type'] = 'application/json';
            return base;
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type || 'success'}`;
            setTimeout(() => alert.classList.remove('show'), 3500);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach((sec) => {
                sec.classList.toggle('active', sec.id === tab);
            });

            if (tab === 'overview') loadOverview();
            if (tab === 'simulations') loadSimulations();
            if (tab === 'debates') loadDebates();
            if (tab === 'policy') loadPolicy();
            if (tab === 'submissions') loadAllSubmissions();
        }

        async function loadOverview() {
            try {
                const [analyticsRes, submissionsRes] = await Promise.all([
                    fetch(`${API_BASE}/practice-analytics`, { headers: authHeaders() }),
                    fetch(`${API_BASE}/practice-submissions?limit=5`, { headers: authHeaders() })
                ]);

                if (analyticsRes.status === 401 || submissionsRes.status === 401) return logout();

                const analytics = await analyticsRes.json();
                const recent = await submissionsRes.json();

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-box">
                        <h4>Total Submissions</h4>
                        <p>${analytics.totalSubmissions || 0}</p>
                    </div>
                    <div class="stat-box">
                        <h4>Evaluated</h4>
                        <p>${analytics.completedEvaluations || 0}</p>
                    </div>
                    <div class="stat-box">
                        <h4>Average Score</h4>
                        <p>${Math.round(analytics.averageScore || 0)}</p>
                    </div>
                `;

                document.getElementById('recentSubmissions').innerHTML = renderSubmissionTable(recent, false);
            } catch (err) {
                showAlert('Failed to load overview', 'error');
            }
        }

        function addSimulationOption() {
            simOptions.push({ id: '', title: '', description: '' });
            renderSimulationOptions();
        }

        function removeSimulationOption(index) {
            simOptions.splice(index, 1);
            renderSimulationOptions();
        }

        function renderSimulationOptions() {
            const root = document.getElementById('simOptionsList');
            if (!simOptions.length) {
                root.innerHTML = '<p style="color: var(--text-muted);">No options added yet.</p>';
                return;
            }

            root.innerHTML = simOptions.map((opt, idx) => `
                <div class="option-item">
                    <div class="form-group">
                        <label>Option ID</label>
                        <input type="text" value="${opt.id}" onchange="simOptions[${idx}].id=this.value">
                    </div>
                    <div class="form-group">
                        <label>Option Title</label>
                        <input type="text" value="${opt.title}" onchange="simOptions[${idx}].title=this.value">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea rows="2" onchange="simOptions[${idx}].description=this.value">${opt.description}</textarea>
                    </div>
                    <button type="button" class="btn btn-danger" onclick="removeSimulationOption(${idx})">Remove</button>
                </div>
            `).join('');
        }

        async function saveSimulation() {
            const scenario = document.getElementById('simScenario').value.trim();
            const context = document.getElementById('simContext').value.trim();
            const difficulty = document.getElementById('simDifficulty').value;
            const category = document.getElementById('simCategory').value.trim();
            const criteria = document.getElementById('simCriteria').value.trim();

            if (!scenario || !simOptions.length) {
                showAlert('Scenario and at least one option are required.', 'warning');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/practice-resources/simulation`, {
                    method: 'POST',
                    headers: authHeaders(true),
                    body: JSON.stringify({ scenario, context, options: simOptions, criteria, difficulty, category })
                });

                if (res.status === 401) return logout();
                if (!res.ok) throw new Error('Request failed');

                showAlert('Simulation created successfully.', 'success');
                document.getElementById('simScenario').value = '';
                document.getElementById('simContext').value = '';
                document.getElementById('simCategory').value = '';
                document.getElementById('simCriteria').value = '';
                simOptions = [];
                renderSimulationOptions();
                loadSimulations();
            } catch (err) {
                showAlert('Could not create simulation.', 'error');
            }
        }

        async function loadSimulations() {
            try {
                const res = await fetch(`${API_BASE}/practice-resources/type/simulation`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                const list = await res.json();

                const body = document.getElementById('simulationsTableBody');
                if (!list.length) {
                    body.innerHTML = '<tr><td colspan="4">No simulations found.</td></tr>';
                    return;
                }

                body.innerHTML = list.map((item) => `
                    <tr>
                        <td>${escapeHtml(item.simulationScenario || '').slice(0, 120)}${(item.simulationScenario || '').length > 120 ? '...' : ''}</td>
                        <td>${item.difficulty || '-'}</td>
                        <td><span class="badge ${item.isActive ? 'badge-active' : 'badge-inactive'}">${item.isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-warn" onclick="toggleResource('${item._id}')">${item.isActive ? 'Deactivate' : 'Activate'}</button>
                                <button class="btn btn-danger" onclick="deleteResource('${item._id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showAlert('Failed to load simulations.', 'error');
            }
        }

        async function saveDebate() {
            const topic = document.getElementById('debateTopic').value.trim();
            const context = document.getElementById('debateContext').value.trim();
            const timeLimit = Number(document.getElementById('debateTime').value || 120);
            const difficulty = document.getElementById('debateDifficulty').value;
            const category = document.getElementById('debateCategory').value.trim();
            const criteria = document.getElementById('debateCriteria').value.trim();

            if (!topic) {
                showAlert('Debate topic is required.', 'warning');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/practice-resources/debate`, {
                    method: 'POST',
                    headers: authHeaders(true),
                    body: JSON.stringify({ topic, context, timeLimit, criteria, difficulty, category })
                });

                if (res.status === 401) return logout();
                if (!res.ok) throw new Error('Request failed');

                showAlert('Debate topic created.', 'success');
                document.getElementById('debateTopic').value = '';
                document.getElementById('debateContext').value = '';
                document.getElementById('debateCategory').value = '';
                document.getElementById('debateCriteria').value = '';
                loadDebates();
            } catch (err) {
                showAlert('Could not create debate topic.', 'error');
            }
        }

        async function loadDebates() {
            try {
                const res = await fetch(`${API_BASE}/practice-resources/type/debateTopic`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                const list = await res.json();

                const body = document.getElementById('debatesTableBody');
                if (!list.length) {
                    body.innerHTML = '<tr><td colspan="4">No debate topics found.</td></tr>';
                    return;
                }

                body.innerHTML = list.map((item) => `
                    <tr>
                        <td>${escapeHtml(item.debateTopic || '').slice(0, 120)}${(item.debateTopic || '').length > 120 ? '...' : ''}</td>
                        <td>${item.difficulty || '-'}</td>
                        <td><span class="badge ${item.isActive ? 'badge-active' : 'badge-inactive'}">${item.isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-warn" onclick="toggleResource('${item._id}')">${item.isActive ? 'Deactivate' : 'Activate'}</button>
                                <button class="btn btn-danger" onclick="deleteResource('${item._id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showAlert('Failed to load debate topics.', 'error');
            }
        }

        async function savePolicy() {
            const title = document.getElementById('policyTitle').value.trim();
            const content = document.getElementById('policyContent').value.trim();
            const difficulty = document.getElementById('policyDifficulty').value;
            const category = document.getElementById('policyCategory').value.trim();
            const criteria = document.getElementById('policyCriteria').value.trim();

            if (!title || !content) {
                showAlert('Title and content are required.', 'warning');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/practice-resources/policy-guidance`, {
                    method: 'POST',
                    headers: authHeaders(true),
                    body: JSON.stringify({ title, content, criteria, difficulty, category })
                });

                if (res.status === 401) return logout();
                if (!res.ok) throw new Error('Request failed');

                showAlert('Policy guidance created.', 'success');
                document.getElementById('policyTitle').value = '';
                document.getElementById('policyContent').value = '';
                document.getElementById('policyCategory').value = '';
                document.getElementById('policyCriteria').value = '';
                loadPolicy();
            } catch (err) {
                showAlert('Could not create policy guidance.', 'error');
            }
        }

        async function loadPolicy() {
            try {
                const res = await fetch(`${API_BASE}/practice-resources/type/policyGuidance`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                const list = await res.json();

                const body = document.getElementById('policyTableBody');
                if (!list.length) {
                    body.innerHTML = '<tr><td colspan="4">No policy guidance found.</td></tr>';
                    return;
                }

                body.innerHTML = list.map((item) => `
                    <tr>
                        <td>${escapeHtml(item.policyGuidanceTitle || '').slice(0, 120)}${(item.policyGuidanceTitle || '').length > 120 ? '...' : ''}</td>
                        <td>${item.difficulty || '-'}</td>
                        <td><span class="badge ${item.isActive ? 'badge-active' : 'badge-inactive'}">${item.isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-warn" onclick="toggleResource('${item._id}')">${item.isActive ? 'Deactivate' : 'Activate'}</button>
                                <button class="btn btn-danger" onclick="deleteResource('${item._id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showAlert('Failed to load policy guidance.', 'error');
            }
        }

        async function loadAllSubmissions() {
            try {
                const res = await fetch(`${API_BASE}/practice-submissions?limit=50`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                const submissions = await res.json();
                document.getElementById('allSubmissions').innerHTML = renderSubmissionTable(submissions, true);
            } catch (err) {
                showAlert('Failed to load submissions.', 'error');
            }
        }

        async function toggleResource(id) {
            try {
                const res = await fetch(`${API_BASE}/practice-resources/${id}/toggle`, {
                    method: 'PATCH',
                    headers: authHeaders()
                });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error('Request failed');

                showAlert('Resource status updated.', 'success');
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                if (activeTab === 'simulations') loadSimulations();
                if (activeTab === 'debates') loadDebates();
                if (activeTab === 'policy') loadPolicy();
                if (activeTab === 'overview') loadOverview();
            } catch (err) {
                showAlert('Failed to update resource status.', 'error');
            }
        }

        async function deleteResource(id) {
            if (!confirm('Delete this resource? This action cannot be undone.')) return;

            try {
                const res = await fetch(`${API_BASE}/practice-resources/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error('Request failed');

                showAlert('Resource deleted.', 'success');
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                if (activeTab === 'simulations') loadSimulations();
                if (activeTab === 'debates') loadDebates();
                if (activeTab === 'policy') loadPolicy();
                if (activeTab === 'overview') loadOverview();
            } catch (err) {
                showAlert('Failed to delete resource.', 'error');
            }
        }

        function renderSubmissionTable(submissions, showScore) {
            if (!Array.isArray(submissions) || submissions.length === 0) {
                return '<p style="color: var(--text-muted); margin-top: 0.75rem;">No submissions found.</p>';
            }

            return `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Type</th>
                            ${showScore ? '<th>Score</th>' : ''}
                            <th>Status</th>
                            ${showScore ? '<th>Actions</th>' : ''}
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${submissions.map((sub) => {
                            const date = new Date(sub.createdAt).toLocaleDateString();
                            const score = sub.aiEvaluation && typeof sub.aiEvaluation.score === 'number' ? Math.round(sub.aiEvaluation.score) : '-';
                            const isLoading = reevaluateLoadingId === sub._id;
                            return `
                                <tr>
                                    <td>${escapeHtml((sub.userId && sub.userId.name) ? sub.userId.name : 'Unknown')}</td>
                                    <td>${escapeHtml(sub.submissionType || '-')}</td>
                                    ${showScore ? `<td>${score}</td>` : ''}
                                    <td><span class="badge ${sub.evaluationStatus === 'completed' ? 'badge-active' : 'badge-inactive'}">${escapeHtml(sub.evaluationStatus || '-')}</span></td>
                                    ${showScore ? `<td><button class="btn btn-warn" type="button" onclick="reevaluateSubmission('${sub._id}')" ${isLoading ? 'disabled' : ''}>${isLoading ? 'Re-evaluating...' : 'Re-evaluate'}</button></td>` : ''}
                                    <td>${date}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        async function reevaluateSubmission(id) {
            if (reevaluateLoadingId) return;
            reevaluateLoadingId = id;
            loadAllSubmissions();

            try {
                const res = await fetch(`${API_BASE}/practice-submissions/${id}/reevaluate`, {
                    method: 'POST',
                    headers: authHeaders()
                });

                if (res.status === 401) return logout();
                if (res.status === 403) {
                    showAlert('You do not have permission to re-evaluate submissions.', 'error');
                    return;
                }
                if (!res.ok) throw new Error('Request failed');

                showAlert('Submission queued for re-evaluation.', 'success');
                loadAllSubmissions();
                loadOverview();
            } catch (err) {
                showAlert('Could not re-evaluate submission.', 'error');
            } finally {
                reevaluateLoadingId = null;
                loadAllSubmissions();
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.querySelectorAll('.tab-btn').forEach((btn) => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        document.getElementById('toggleSimulationBtn').addEventListener('click', () => {
            const form = document.getElementById('simulationForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
            if (form.style.display === 'block' && simOptions.length === 0) addSimulationOption();
        });

        document.getElementById('toggleDebateBtn').addEventListener('click', () => {
            const form = document.getElementById('debateForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('togglePolicyBtn').addEventListener('click', () => {
            const form = document.getElementById('policyForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('addOptionBtn').addEventListener('click', addSimulationOption);
        document.getElementById('saveSimulationBtn').addEventListener('click', saveSimulation);
        document.getElementById('saveDebateBtn').addEventListener('click', saveDebate);
        document.getElementById('savePolicyBtn').addEventListener('click', savePolicy);

        loadOverview();
    </script>
</body>
</html>
